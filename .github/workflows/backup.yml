name: Backup diário do banco

on:
  schedule:
    # 03:00 BR (UTC-3) = 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date -u +%Y-%m-%d_%H-%M-%S)
          OUTFILE="backup-$DATE.sql"
          pg_dump "$DATABASE_URL" --no-owner --no-acl --clean --if-exists > "$OUTFILE"
          gzip "$OUTFILE"
          ls -lh "$OUTFILE.gz"
          echo "BACKUP_FILE=$OUTFILE.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          compression-level: 0